<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Templates — AutoInspect Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/admin.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" role="main">
      <header class="top-header" id="top-header"></header>
      <div class="page-content" id="main-content">
        <div class="page-header">
          <div class="page-header-left">
            <h2>Checklist Templates</h2>
            <p>Create and manage inspection checklist templates for different vehicle types</p>
          </div>
          <div class="page-header-right">
            <button class="btn btn-primary" onclick="openModal('template-modal')">
              <i class="fas fa-plus"></i> New Template
            </button>
          </div>
        </div>

        <!-- Template Cards -->
        <div class="template-list" id="template-list"></div>

        <!-- Template Detail -->
        <div class="card mt-8" id="template-detail" style="display:none">
          <div class="card-header">
            <div>
              <h3 id="detail-title">Standard Sedan Inspection</h3>
              <p style="font-size:var(--text-sm);color:var(--text-tertiary);margin-top:2px" id="detail-subtitle">6 sections &middot; 48 checklist items</p>
            </div>
            <div style="display:flex;gap:var(--space-2)">
              <button class="btn btn-secondary btn-sm"><i class="fas fa-copy"></i> Duplicate</button>
              <button class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Save Changes</button>
            </div>
          </div>
          <div class="card-body" id="template-sections"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Template Modal -->
  <div class="modal-overlay" id="template-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New Template</h3>
        <button class="modal-close" onclick="closeModal('template-modal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Template Name <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="e.g., Luxury Sedan Inspection">
        </div>
        <div class="form-group">
          <label class="form-label">Vehicle Type <span class="required">*</span></label>
          <select class="form-select">
            <option>Sedan</option>
            <option>SUV</option>
            <option>Truck</option>
            <option>Hatchback</option>
            <option>Van</option>
            <option>EV</option>
            <option>Motorcycle</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Base Template</label>
          <select class="form-select">
            <option value="">Start from scratch</option>
            <option>Copy from: Standard Sedan Inspection</option>
            <option>Copy from: SUV / Crossover Inspection</option>
          </select>
          <span class="form-hint">Optionally start with an existing template and customise it</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('template-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="closeModal('template-modal');showToast('success','Template Created','New template ready for configuration')">
          <i class="fas fa-plus"></i> Create Template
        </button>
      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    checkAuth();
    renderSidebar('admin-templates');
    renderHeader('Checklist Templates', [{ label: 'Home', href: 'dashboard.html' }, { label: 'Admin' }, { label: 'Templates' }]);
    renderMobileNav('admin-templates');

    function renderTemplates() {
      const list = document.getElementById('template-list');
      const templates = MOCK_DATA.checklistTemplates;
      const iconMap = { Sedan: 'fa-car', SUV: 'fa-truck-monster', Truck: 'fa-truck-pickup', EV: 'fa-charging-station' };

      list.innerHTML = templates.map(t => {
        const sectionCount = t.sections.length || 6;
        const itemCount = t.sections.reduce((acc, s) => acc + s.items.length, 0) || 48;
        return `
          <div class="template-card" onclick="showTemplateDetail('${t.id}')">
            <div class="template-card-header">
              <div>
                <h4>${t.name}</h4>
                <div class="template-type"><i class="fas ${iconMap[t.vehicleType] || 'fa-car'}"></i> ${t.vehicleType}</div>
              </div>
              <span class="badge ${t.isActive ? 'badge-success' : 'badge-gray'}">${t.isActive ? 'Active' : 'Inactive'}</span>
            </div>
            <div class="template-stats">
              <div class="template-stat"><i class="fas fa-layer-group"></i> ${sectionCount} sections</div>
              <div class="template-stat"><i class="fas fa-list-check"></i> ${itemCount} items</div>
              <div class="template-stat"><i class="fas fa-clipboard-check"></i> ${t.usageCount} uses</div>
            </div>
            <div class="template-card-footer">
              <span class="last-edited">Last edited ${formatDate(t.lastEdited)}</span>
              <div style="display:flex;gap:var(--space-1)">
                <button class="btn btn-ghost btn-icon btn-sm" data-tooltip="Edit" onclick="event.stopPropagation()"><i class="fas fa-edit"></i></button>
                <button class="btn btn-ghost btn-icon btn-sm" data-tooltip="Duplicate" onclick="event.stopPropagation()"><i class="fas fa-copy"></i></button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showTemplateDetail(id) {
      const template = MOCK_DATA.checklistTemplates.find(t => t.id === id);
      if (!template || template.sections.length === 0) {
        showToast('info', 'Template Preview', 'Full template editor would open here');
        return;
      }

      document.getElementById('template-detail').style.display = 'block';
      document.getElementById('detail-title').textContent = template.name;
      const totalItems = template.sections.reduce((acc, s) => acc + s.items.length, 0);
      document.getElementById('detail-subtitle').textContent = `${template.sections.length} sections \u00b7 ${totalItems} checklist items`;

      document.getElementById('template-sections').innerHTML = template.sections.map(section => `
        <div class="checklist-section mb-4">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);background:var(--color-gray-50);border:1px solid var(--color-gray-200);border-radius:var(--radius-lg) var(--radius-lg) 0 0">
            <h4 style="font-size:var(--text-base);display:flex;align-items:center;gap:var(--space-2)">
              <i class="fas ${section.icon}" style="color:var(--color-primary)"></i> ${section.title}
            </h4>
            <span style="font-size:var(--text-xs);color:var(--text-tertiary)">${section.items.length} items</span>
          </div>
          <div style="border:1px solid var(--color-gray-200);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg)">
            ${section.items.map(item => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-gray-100)">
                <div style="display:flex;align-items:center;gap:var(--space-2)">
                  <i class="fas fa-grip-vertical" style="color:var(--color-gray-300);cursor:grab"></i>
                  <span style="font-size:var(--text-sm)">${item.label}</span>
                  ${item.required ? '<span style="color:var(--color-danger);font-size:var(--text-xs)">Required</span>' : ''}
                </div>
                <div style="display:flex;align-items:center;gap:var(--space-2)">
                  <span class="badge badge-gray" style="font-size:0.625rem">${item.type.replace(/_/g, '/')}</span>
                  <button class="btn btn-ghost btn-icon btn-sm"><i class="fas fa-edit" style="font-size:0.75rem"></i></button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      document.getElementById('template-detail').scrollIntoView({ behavior: 'smooth' });
    }

    renderTemplates();
  </script>
</body>
</html>
