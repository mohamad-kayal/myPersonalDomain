<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muslim Kids VP — Interactive Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="proto-header">
    <h1>Muslim Kids VP</h1>
    <p>Interactive Prototype · Tap screens below or use the phone</p>
  </div>

  <!-- Theme Switcher -->
  <div class="theme-switcher" id="theme-switcher"></div>

  <!-- Prototype Controls (Offline toggle, etc.) -->
  <div class="proto-controls" id="proto-controls"></div>

  <!-- Screen Navigation -->
  <div class="screen-nav" id="screen-nav"></div>

  <!-- Phone Frame -->
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen" id="phone-screen-inner" dir="ltr">
      <!-- Screens rendered by JS -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
