<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — AutoInspect Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/admin.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" role="main">
      <header class="top-header" id="top-header"></header>
      <div class="page-content" id="main-content">
        <div class="page-header">
          <div class="page-header-left">
            <h2>User Management</h2>
            <p>Manage team members and their roles</p>
          </div>
          <div class="page-header-right">
            <button class="btn btn-primary" onclick="openModal('invite-modal')">
              <i class="fas fa-user-plus"></i> Invite User
            </button>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid mb-8">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-users"></i></div>
            <div class="stat-content">
              <div class="stat-label">Total Users</div>
              <div class="stat-value" id="total-users">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
            <div class="stat-content">
              <div class="stat-label">Active</div>
              <div class="stat-value" id="active-users">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon amber"><i class="fas fa-hard-hat"></i></div>
            <div class="stat-content">
              <div class="stat-label">Inspectors</div>
              <div class="stat-value" id="inspector-count">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red"><i class="fas fa-user-shield"></i></div>
            <div class="stat-content">
              <div class="stat-label">Admins</div>
              <div class="stat-value" id="admin-count">0</div>
            </div>
          </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar mb-6">
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" class="form-input" placeholder="Search users..." id="user-search" oninput="filterUsers()">
          </div>
          <select class="form-select" id="role-filter" onchange="filterUsers()">
            <option value="">All Roles</option>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="inspector">Inspector</option>
          </select>
          <select class="form-select" id="status-filter" onchange="filterUsers()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <!-- Users Table -->
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>Status</th>
                <th class="hide-mobile">Inspections</th>
                <th class="hide-mobile">Last Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Invite User Modal -->
  <div class="modal-overlay" id="invite-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Invite New User</h3>
        <button class="modal-close" onclick="closeModal('invite-modal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="John Smith">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" class="form-input" placeholder="john@dealership.com">
        </div>
        <div class="form-group">
          <label class="form-label">Role <span class="required">*</span></label>
          <select class="form-select">
            <option value="inspector">Inspector</option>
            <option value="manager">Sales Manager</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <div class="form-hint">An invitation email will be sent with a link to set their password.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('invite-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="if(validateInviteForm()){closeModal('invite-modal');showToast('success','Invitation Sent','User will receive an email to set up their account')}">
          <i class="fas fa-paper-plane"></i> Send Invite
        </button>
      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    checkAuth();
    renderSidebar('admin-users');
    renderHeader('User Management', [{ label: 'Home', href: 'dashboard.html' }, { label: 'Admin' }, { label: 'Users' }]);
    renderMobileNav('admin-users');

    // Stats
    const users = MOCK_DATA.users;
    document.getElementById('total-users').textContent = users.length;
    document.getElementById('active-users').textContent = users.filter(u => u.status === 'active').length;
    document.getElementById('inspector-count').textContent = users.filter(u => u.role === 'inspector').length;
    document.getElementById('admin-count').textContent = users.filter(u => u.role === 'admin').length;

    function filterUsers() {
      const search = document.getElementById('user-search').value.toLowerCase();
      const role = document.getElementById('role-filter').value;
      const status = document.getElementById('status-filter').value;
      let filtered = MOCK_DATA.users;
      if (search) filtered = filtered.filter(u => `${u.name} ${u.email}`.toLowerCase().includes(search));
      if (role) filtered = filtered.filter(u => u.role === role);
      if (status) filtered = filtered.filter(u => u.status === status);
      renderUsers(filtered);
    }

    function renderUsers(users) {
      const roleLabels = { admin: 'Administrator', manager: 'Sales Manager', inspector: 'Inspector' };
      const roleColors = { admin: 'badge-danger', manager: 'badge-info', inspector: 'badge-primary' };

      document.getElementById('users-body').innerHTML = users.map(u => `
        <tr>
          <td data-label="">
            <div style="display:flex;align-items:center;gap:var(--space-3)">
              <div class="avatar ${getAvatarColor(u.name)}">${u.avatar}</div>
              <div>
                <div style="font-weight:var(--font-medium)">${u.name}</div>
                <div style="font-size:var(--text-xs);color:var(--text-tertiary)">${u.email}</div>
              </div>
            </div>
          </td>
          <td data-label="Role"><span class="badge ${roleColors[u.role]}">${roleLabels[u.role]}</span></td>
          <td data-label="Status">
            <div style="display:flex;align-items:center;gap:var(--space-2)">
              <span class="status-dot ${u.status === 'active' ? 'green' : 'gray'}"></span>
              <span style="font-size:var(--text-sm)">${u.status === 'active' ? 'Active' : 'Inactive'}</span>
            </div>
          </td>
          <td data-label="Inspections" class="hide-mobile" style="font-weight:var(--font-medium)">${u.inspections}</td>
          <td data-label="Last Active" class="hide-mobile" style="font-size:var(--text-sm);color:var(--text-secondary)">${formatDate(u.lastActive)}</td>
          <td data-label="">
            <div class="table-actions">
              <button class="btn btn-ghost btn-icon btn-sm" data-tooltip="Edit"><i class="fas fa-edit"></i></button>
              <div class="dropdown">
                <button class="btn btn-ghost btn-icon btn-sm" onclick="toggleDropdown(this)"><i class="fas fa-ellipsis-v"></i></button>
                <div class="dropdown-menu">
                  <button class="dropdown-item"><i class="fas fa-key"></i> Reset Password</button>
                  <button class="dropdown-item"><i class="fas fa-exchange-alt"></i> Change Role</button>
                  <div class="dropdown-divider"></div>
                  <button class="dropdown-item danger" onclick="showToast('info','User Deactivated','${u.name} has been deactivated')">
                    <i class="fas fa-user-slash"></i> Deactivate
                  </button>
                </div>
              </div>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function validateInviteForm() {
      const modal = document.getElementById('invite-modal');
      const nameInput = modal.querySelector('input[type="text"]');
      const emailInput = modal.querySelector('input[type="email"]');
      let valid = true;

      if (!nameInput.value.trim()) {
        nameInput.style.borderColor = 'var(--color-danger)';
        valid = false;
      } else {
        nameInput.style.borderColor = '';
      }

      if (!emailInput.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
        emailInput.style.borderColor = 'var(--color-danger)';
        valid = false;
      } else {
        emailInput.style.borderColor = '';
      }

      if (!valid) {
        showToast('error', 'Validation Error', 'Please fill in all required fields with valid values');
      }
      return valid;
    }

    renderUsers(MOCK_DATA.users);
  </script>
</body>
</html>
